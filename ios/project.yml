name: WorkCRM
options:
  bundleIdPrefix: com.workstationoffice
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    DEVELOPMENT_TEAM: 8G83Q2867K
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    # Default ON — the test target relies on it. The WorkCRM target overrides to
    # NO because we ship our own Info.plist (see the `info:` block on it below).
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    OTHER_SWIFT_FLAGS: "-strict-concurrency=complete"

configs:
  Debug: debug
  Release: release

targets:
  WorkCRM:
    type: application
    platform: iOS
    sources:
      - path: WorkCRM
    # An explicit Info.plist is required (vs. INFOPLIST_KEY_* build settings)
    # because CFBundleURLTypes is an array of dictionaries — not expressible as a
    # scalar build setting. The plist is generated by XcodeGen on `xcodegen generate`
    # so we don't commit binary or wire-up drift.
    info:
      path: WorkCRM/Info.plist
      properties:
        # ── OAuth redirect ────────────────────────────────────────────────────
        # `workcrm://` is the scheme our backend (POST /auth/oauth/ms365/mobile/begin)
        # tells Microsoft to redirect back to after sign-in. The OS routes any
        # `workcrm://oauth/callback?…` URL into the app via the scene/AppDelegate.
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLName: com.workstationoffice.workcrm.oauth
            CFBundleURLSchemes: [workcrm]
        LSApplicationCategoryType: public.app-category.business
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSCameraUsageDescription: WorkCRM uses the camera to capture a check-in selfie when you arrive at a customer site.
        NSMicrophoneUsageDescription: WorkCRM uses the microphone to record voice notes during check-out.
        NSLocationWhenInUseUsageDescription: WorkCRM records your GPS location at visit check-in and check-out so managers can verify on-site visits.
        NSFaceIDUsageDescription: WorkCRM uses Face ID to unlock your signed-in session each time you open the app, so customer data stays protected if your phone is lost.
        UIBackgroundModes: [remote-notification, fetch, processing]
        BGTaskSchedulerPermittedIdentifiers: [com.workstationoffice.workcrm.sync]
        # Build-time interpolation: filled by the active xcconfig (Debug/Release).
        WorkCRMAPIBaseURL: $(WORK_CRM_API_BASE_URL)
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.workstationoffice.workcrm
        GENERATE_INFOPLIST_FILE: NO          # we ship Info.plist via the info: block above
      configs:
        Debug:
          xcconfig: Configs/Debug.xcconfig
        Release:
          xcconfig: Configs/Release.xcconfig
    entitlements:
      path: WorkCRM/WorkCRM.entitlements
      properties:
        aps-environment: production
    dependencies: []

  WorkCRMTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WorkCRMTests
    dependencies:
      - target: WorkCRM

schemes:
  WorkCRM:
    build:
      targets:
        WorkCRM: all
        WorkCRMTests: [test]
    test:
      targets:
        - WorkCRMTests
