<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Stopper cap top bar -->
  <rect x="35" y="18" width="30" height="5" rx="2.5" fill="none" stroke="#7c3aed" stroke-width="2.5"/>
  <!-- Stopper body -->
  <rect x="39" y="23" width="22" height="12" rx="2" fill="#ede9fe" stroke="#7c3aed" stroke-width="2"/>
  <!-- Flask upper body (light) -->
  <polygon points="50,35 39,35 28,62 72,62 61,35" fill="#ede9fe"/>
  <!-- Flask lower body (dark purple) -->
  <rect x="25" y="62" width="50" height="20" rx="2" fill="#6d28d9"/>
  <!-- Bubbles -->
  <circle cx="36" cy="74" r="5" fill="#7c3aed" opacity="0.6"/>
  <circle cx="50" cy="70" r="4" fill="#7c3aed" opacity="0.6"/>
  <circle cx="62" cy="75" r="3.5" fill="#7c3aed" opacity="0.6"/>
  <!-- Flask outline -->
  <polygon points="50,35 39,35 25,62 25,82 75,82 75,62 61,35" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
