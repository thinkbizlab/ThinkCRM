name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: thinkcrm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      # Prisma schema requires both: in production DATABASE_URL points at a
      # pooled connection (Neon/Vercel Postgres) and DIRECT_URL bypasses the
      # pooler for migrations. CI uses a plain Postgres container so the two
      # are the same string.
      DATABASE_URL: postgresql://test:test@localhost:5432/thinkcrm_test
      DIRECT_URL: postgresql://test:test@localhost:5432/thinkcrm_test
      JWT_SECRET: ci-test-secret-not-for-production
      APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: thinkcrm_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/thinkcrm_e2e
      DIRECT_URL: postgresql://test:test@localhost:5432/thinkcrm_e2e
      JWT_SECRET: ci-test-secret-not-for-production
      APP_URL: http://localhost:3000
      E2E_BASE_URL: http://localhost:3000
      E2E_TENANT_SLUG: e2e-test
      E2E_ADMIN_EMAIL: admin@e2e-test.com
      E2E_ADMIN_PASSWORD: E2eTestPassword!123
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx prisma db push --skip-generate
      - run: npx playwright install chromium
      - name: Start server and run E2E tests
        run: |
          npm start &
          npx wait-on http://localhost:3000 --timeout 30000
          npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
